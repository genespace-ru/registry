resource2docker:
  type: collection
  doc: Link between resources with versions and docker images
  primaryKey: ID
  
  scheme:
    columns:
    - ID:
        type: KEYTYPE
        autoIncrement: true
        primaryKey: true
    - resource:
        type: KEYTYPE
        reference: resources.ID
        doc: resource
    - version:
        type: KEYTYPE
        reference: versions.ID
        doc: version
    - docker:
        type: KEYTYPE
        reference: docker.ID
        doc: docker image
                    
    indices:
    - IDX_RESOURCE_DOCKER:
        columns: resource
    - IDX_DOCKER:
        columns: docker


                  
