resources:
  type: table
  displayName: Resources
  order: 10
  doc: Resources. Currently - tools, workflows, notebooks.
  primaryKey: ID
  
  scheme:
    columns:
    - ID:
        type: KEYTYPE
        autoIncrement: true
        primaryKey: true
    - repository:
        type: KEYTYPE
        reference: repositories.ID
        doc: repository
    - name:
        type: VARCHAR(256)
        doc: |
          Resource name. It may only consist of alphanumerics and internal underscores and hyphens, 
          but no spaces or other characters. Names may not exceed 256 characters.
    - type:
        type: ENUM(tool, workflow, notebook)
        doc: resource type
    - language:
        type: ENUM(CWL, WDL, NFL)
        doc: resource language
    - topic:
        type: VARCHAR(200)
        canBeNull: true
        doc: |
          An optional short text description of the resource.
    - info:
        type: JSONB 
        canBeNull: true
        doc: Other structured information from dockstore.yml
                            
    - whoInserted___:
        type: VARCHAR(100)
        defaultValue: '''Administrator'''
    - creationDate___:
        type: DATETIME
        defaultValue: CURRENT_TIMESTAMP
    - whoModified___:
        type: VARCHAR(100)
        canBeNull: true
    - modificationDate___:
        type: DATETIME
        canBeNull: true
        
  queries:
  - '*** Selection view ***':
      code: |-
        SELECT
          rs.ID,
          CONCAT(rp.url, '/', rs.name, '(', rs.type, ')')
        FROM resources rs
        JOIN repositories rp ON rp.ID = rs.repository
        ORDER BY 2
           
  - All records:
      roles: '@AllRoles'
      layout: '{"quickType":"select", "defaultPageLimit": 50}'
      code: |-
        SELECT
          rs.ID AS "___ID",
          rs.ID AS "___resID",
          r2v.version AS "___verID",
          CONCAT('<a href="https://github.com/', rp.url, '" target="_blank">', rp.url, '</a>') AS "Repository",
          COALESCE('<a class="process-hash-url" href="#!resourceCardPage/ID=' || rs.ID || '/versionID=' || r2v.version || '">' || rs.name || '</a>') AS "Name",
          rs.type AS "Type;<quick visible='true' />",
          rs.language AS "Language;<quick visible='true' />",
          rs.topic AS "Description;<quick visible='true' />",
          rs.info AS "Info;<quick visible='false' />",
          <@COMMON_WHO_FIELDS 'rs' />
        FROM resources rs
        JOIN repositories rp ON rp.ID = rs.repository
        JOIN resource2versions r2v ON rs.ID = r2v.resource
        WHERE r2v.defaultVersion = 'yes'
        ORDER BY 1
        
  - Resource card:
      roles: '@AllRolesExceptGuest'
      type: 1D
      invisible: true
      layout: '{"tableBox":"resourceCard", "mode":"named", "hideTitle":"true"}'
      code: |-
            SELECT
              r.ID AS "ID",
              r2v.version AS "versionID",
              CONCAT( 'Карточка ресурса: ', r.name, ':', ver.name ) AS "PageTitle"
            FROM resources r
            JOIN resource2versions r2v ON r2v.resource = r.ID
            JOIN versions ver ON r2v.version = ver.ID
            WHERE 1 = 1
            <if parameter="ID">
                AND r.ID = <parameter:ID/>
            </if>
            <if parameter="versionID">
              AND r2v.version = <parameter:versionID/>
            </if>
  - ResourceCardInfo:
      roles: '@AllRolesExceptGuest'
      type: 1D_unknown
      layout: '{"mode":"named"}'
      invisible: true
      code: |-
        SELECT
          r.ID AS "ID",
          r2v.version AS "versionID",
          CONCAT( 'Карточка ресурса: ', r.name, ':', ver.name ) AS "PageTitle"
        FROM resources r
        JOIN resource2versions r2v ON r2v.resource = r.ID
        JOIN versions ver ON r2v.version = ver.ID
        WHERE 1 = 1
        <if parameter="ID">
                AND r.ID = <parameter:ID/>
            </if>
            <if parameter="versionID">
              AND r2v.version = <parameter:versionID/>
            </if>
  - ResourceTab:
      roles: '@AllRolesExceptGuest'
      invisible: true
      type: 1D_unknown
      layout: '{"tableBox":"resourceTab", "mode":"named", "hideTitle":"true"}'
      code: |-
        SELECT r.ID AS "ID",
            'Workflow: ' || r.name AS "PageTitle"
        FROM resources r
        JOIN repositories rp ON rp.ID = r.repository
        JOIN resource2versions r2v ON r2v.resource = r.ID
        JOIN versions ver ON r2v.version = ver.ID
          WHERE (1=1)
          <if parameter="___resID">
              AND r.ID = <parameter:___resID/>
          </if>
          <if parameter="___verID">
              AND r2v.version = <parameter:___verID/>
          </if>
     
