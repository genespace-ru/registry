attachments:
  type: table
  displayName: attachments
  primaryKey: ID
  scheme:
    columns:
    - ID:
        type: KEYTYPE
        autoIncrement: true
        primaryKey: true
    - ownerID:
        type: KEYTYPE
        reference:
          to:
          - repositories
          - resources
          - versions
          - resource2versions
    - ownerType:
        type: ENUM(repositories, resources, versions, resource2versions, other)
        defaultValue: '''other'''
    - fileName:
        type: VARCHAR(255)
    - mimeType:
        type: VARCHAR(100)
        canBeNull: true
        reference: mimeTypes
        defaultValue: '''application/octet-stream'''
    - data:
        type: BLOB
        canBeNull: true
    - description:
        type: VARCHAR(255)
        canBeNull: true
    - isFetched:
        type: ENUM(yes, no) 
        defaultValue: '''no'''
    - whoInserted___:
        type: VARCHAR(100)
        canBeNull: true
    - whoModified___:
        type: VARCHAR(100)
        canBeNull: true
    - creationDate___:
        type: DATETIME
        canBeNull: true
    - modificationDate___:
        type: DATETIME
        canBeNull: true
    indices:
        - IDX_FILENAME:
            unique: true
            columns: 
            - ownerID
            - ownerType
            - fileName
  queries:
  - All records:
      type: 1D
      roles: '@AllRolesExceptGuest'
      invisible: true
      code: |-
        SELECT 
             a.ID AS "ID", 
             a.fileName AS "Name",
             LENGTH(a.data) 
                AS "Size", 
             a.mimeType 
                AS "MIME Type", 
             '<quick visible="false" />' 
                AS ";MIME Type", 
             CONCAT( '<a href="/api/download?_t_=attachments&_typeColumn_=mimeType&_filenameColumn_=fileName&_dataColumn_=data&ID=', CAST( a.ID AS CHAR ), '&_download_=yes">{{{Download}}}</a>') 
                AS "Download",
             a.creationDate___
                AS "Created", 
             a.whoInserted___ 
                AS "Who Created" 
        FROM attachments a 
        ORDER BY a.creationDate___ DESC
  - ResourceFiles:
      roles: '@AllRolesExceptGuest'
      type: 1D_unknown
      layout: '{"mode":"named"}'
      invisible: true
      code: |-
        SELECT
            at.ownerID AS "ID",
            at.fileName AS "filename",
            at.mimeType AS "filetype",
            at.description AS "description"
        FROM attachments at 
        WHERE at.mimeType='text/plain' 
        <if parameter="resource2versions">
            AND at.ownerID = <parameter:resource2versions/>
            AND at.ownerType = 'resource2versions'
        </if>
    